<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSSID Hub BD - Skin Library</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

</div>

<!-- Dropdown Menu -->
<div id="dropdownMenu" class="dropdown">

<a href="about.html">ℹ️ About</a>
<a href="privacy .html">🔒 Privacy</a>
<a href="terms.html">📜 Terms</a>
<a href="contact.html">📞 Contact</a>

</div>

<h2>BUSSID Hub BD</h2> 
<h3>Skin Library</h3>



<input 
type="text" 
id="search" 
placeholder="Search skin (Hanif, SR2, ENA...)"
onkeyup="searchSkin()"
class="searchBox">

<div class="filter-wrapper">
    <select id="modelFilter" onchange="filterSkins()">
        <option value="all">All Models</option>
        <option value="sr2">SR2</option>
        <option value="sr3">SR3</option>
        <option value="hino1j">Hino</option>
    </select>
</div>

<div class="filter-wrapper">
    <select id="typeFilter" onchange="filterSkins()">
        <option value="all">All Types</option>
        <option value="official">Official 🌐</option>
        <option value="local">Local 📦</option>
    </select>
</div>

<div id="skinGrid" class="grid"></div>

<!-- preview modal -->

<div id="previewModal" onclick="closePreview()">

<img id="previewImg">

</div>

<script src="../app.js"></script>

</body>
</html>
